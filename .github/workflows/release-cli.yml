name: Release forge CLI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write     # publish GitHub release
  id-token: write     # cosign keyless OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forge-cli
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # GoReleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: forge-cli/go.sum

      - uses: sigstore/cosign-installer@v3

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
          workdir: forge-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Token with contents:write on codecollab-co/homebrew-forge
          # and codecollab-co/scoop-forge.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
