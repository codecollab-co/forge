name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  platform:
    name: forge-platform
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || contains(toJson(github.event.pull_request.changed_files), 'forge-platform/')
    defaults:
      run:
        working-directory: forge-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: forge-platform/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...

  agent:
    name: forge-agent
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || contains(toJson(github.event.pull_request.changed_files), 'forge-agent/')
    defaults:
      run:
        working-directory: forge-agent
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync
      - run: uv run python -c "from app.main import app; print('app imports cleanly')"
      - run: uv run --with pytest pytest tests/ -q

  web:
    name: forge-web
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || contains(toJson(github.event.pull_request.changed_files), 'forge-web/')
    defaults:
      run:
        working-directory: forge-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
        env:
          PLATFORM_API_URL: http://localhost:8080
